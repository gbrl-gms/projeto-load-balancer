services:
  # Environment images
  server_a:
    build: ./images/mirror_server
    container_name: sv-a
    cpus: '0.8'

  server_b:
    build: ./images/mirror_server
    container_name: sv-b
    cpus: '0.2'

  load_balancer_nginx:
    build: ./images/load_balancer_nginx
    container_name: lb-ng

  load_balancer_qlearn:
    build: ./images/load_balancer_qlearn
    container_name: lb-bm
    command: /bin/bash

  client:
    build: ./images/client_node
    container_name: cli

    command: /bin/bash
    tty: true
    stdin_open: true

  # Containernet privileged image
  containernet-lab:
    image: containernet/containernet:latest
    container_name: containernet-lab
    privileged: true
    pid: host
    tty: true
    stdin_open: true

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PWD}/containernet/scripts:${PWD}/containernet/scripts

    environment:
      - PYTHONUNBUFFERED=1

    working_dir: ${PWD}/containernet/scripts

    entrypoint: /bin/bash

    networks:
      - lab-network

    healthcheck:
      test: ["CMD", "docker", "ps"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  lab-network:
    driver: bridge
